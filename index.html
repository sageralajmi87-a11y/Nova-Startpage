<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        :root {
            --bg-base: #020005;
            --bg-glow: #15052e;
            --accent-main: #d8b4fe;
            --accent-hover: #e9d5ff;
            --link-title: #a78bfa;
            --link-url: #818cf8;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% -20%, var(--bg-glow), transparent 60%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden; /* Hide main scroll, handle in results */
        }

        /* The Master Layout */
        .master-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0 20px;
            transition: var(--transition-smooth);
            transform: translateY(0);
        }

        /* The 'Searching' State */
        .searching-state {
            justify-content: flex-start;
            padding-top: 5vh;
        }

        /* Typography & Header */
        .header-group {
            text-align: center;
            transition: var(--transition-smooth);
        }

        .logo {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -4px;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-main) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px rgba(216, 180, 254, 0.15));
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .searching-state .logo { font-size: 2.5rem; letter-spacing: -1px; }

        .clock {
            font-size: 1.1rem;
            color: var(--accent-main);
            letter-spacing: 6px;
            margin-top: 5px;
            margin-bottom: 30px;
            opacity: 0.8;
            font-weight: 300;
            transition: var(--transition-smooth);
            height: 20px; /* fixed height to prevent layout jumping */
            overflow: hidden;
        }

        .searching-state .clock { opacity: 0; height: 0; margin: 0; }

        /* Search Input */
        .search-container {
            width: 100%;
            max-width: 650px;
            position: relative;
            z-index: 10;
        }

        .search-bar {
            width: 100%;
            padding: 20px 30px;
            border-radius: 100px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.2rem;
            outline: none;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }

        .search-bar:focus {
            border-color: rgba(216, 180, 254, 0.5);
            box-shadow: 0 0 30px rgba(216, 180, 254, 0.15), inset 0 0 10px rgba(216, 180, 254, 0.05);
            background: rgba(255, 255, 255, 0.04);
        }

        /* Results Area */
        .results-container {
            width: 100%;
            max-width: 750px;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.5s ease;
            max-height: 70vh;
            overflow-y: auto;
            padding: 5px 15px;
        }

        /* Custom Scrollbar for Results */
        .results-container::-webkit-scrollbar { width: 6px; }
        .results-container::-webkit-scrollbar-thumb { background: rgba(216, 180, 254, 0.2); border-radius: 10px; }
        .results-container::-webkit-scrollbar-thumb:hover { background: rgba(216, 180, 254, 0.5); }

        .results-active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .result-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 22px 28px;
            border-radius: 16px;
            transition: all 0.3s ease;
            text-align: left;
        }

        .result-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(216, 180, 254, 0.3);
            transform: scale(1.01);
        }

        .res-url { color: var(--link-url); font-size: 0.85rem; display: block; margin-bottom: 6px; }
        .res-link { color: var(--link-title); font-size: 1.35rem; font-weight: 600; text-decoration: none; display: inline-block; margin-bottom: 8px; }
        .res-link:hover { text-decoration: underline; color: var(--accent-hover); }
        .res-desc { color: var(--text-muted); line-height: 1.6; font-size: 0.95rem; margin: 0; }

        /* Loader */
        .loader { color: var(--accent-main); font-style: italic; text-align: center; padding: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="master-container" id="appRoot">
        <div class="header-group">
            <h1 class="logo" onclick="resetUI()">NOVA</h1>
            <div class="clock" id="timeDisplay">00:00:00</div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search the galaxy..." autocomplete="off">
        </div>

        <div class="results-container" id="searchResults"></div>
    </div>

    <!-- UI Sounds -->
    <audio id="sndSearch" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="sndReset" src="https://www.soundjay.com/buttons/sounds/button-17.mp3" preload="auto"></audio>

    <script>
        // 1. Live Time
        function updateTime() {
            document.getElementById('timeDisplay').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }
        setInterval(updateTime, 1000); updateTime();

        // 2. Core Search Logic
        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const root = document.getElementById('appRoot');
            const results = document.getElementById('searchResults');

            // PRO FEATURE: If empty and Enter is pressed -> Reset to Middle
            if (!query) {
                resetUI();
                return;
            }

            // Key check
            let apiKey = localStorage.getItem('nova_pro_key');
            if (!apiKey) {
                apiKey = prompt("Nova Pro Authorization Required.\nEnter Groq API Key:");
                if (apiKey) localStorage.setItem('nova_pro_key', apiKey);
                else return;
            }

            // Trigger Search State Animations
            root.classList.add('searching-state');
            document.getElementById('sndSearch').play().catch(()=>{});
            
            // Show loader
            results.innerHTML = "<div class='result-card'><div class='loader'>Establishing quantum connection...</div></div>";
            results.classList.add('results-active');

            // API Call
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system", 
                                content: "You are a search engine. Return exactly 5 highly accurate search results for the user's query. Use this EXACT HTML structure for each result, and nothing else: <div class='result-card'><span class='res-url'>FULL_URL_HERE</span><br><a href='FULL_URL_HERE' target='_blank' class='res-link'>TITLE_HERE</a><p class='res-desc'>DESCRIPTION_HERE</p></div>. Do not include markdown blocks like ```html. Output raw HTML only."
                            },
                            {role: "user", content: query}
                        ],
                        temperature: 0.1
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                // Remove markdown codeblock artifacts if the AI sneaks them in
                let rawHTML = data.choices[0].message.content;
                rawHTML = rawHTML.replace(/```html/gi, '').replace(/```/g, '');
                
                results.innerHTML = rawHTML;

            } catch (err) {
                results.innerHTML = `<div class='result-card' style='border-color: #ef4444;'><span class='res-link' style='color:#ef4444'>Connection Error</span><p class='res-desc'>${err.message}</p></div>`;
                if(err.message.includes("API key") || err.message.includes("key")) localStorage.removeItem('nova_pro_key');
            }
        }

        // 3. Reset UI Function
        function resetUI() {
            const root = document.getElementById('appRoot');
            const results = document.getElementById('searchResults');
            const input = document.getElementById('searchInput');
            
            // Play reset sound
            document.getElementById('sndReset').play().catch(()=>{});
            
            // Clear text
            input.value = "";
            
            // Fade out results
            results.classList.remove('results-active');
            
            // Animate layout back to center
            root.classList.remove('searching-state');
            
            // Wait for fade out, then clear DOM
            setTimeout(() => {
                if(!root.classList.contains('searching-state')) {
                    results.innerHTML = "";
                }
            }, 500);
        }

        // 4. Event Listeners
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeSearch();
        });
        
        // Clear input with Escape key
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') resetUI();
        });
    </script>
</body>
</html>
